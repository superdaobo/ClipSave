name: Release

on:
  workflow_dispatch:
  push:
    branches: [main, release]
    tags:
      - 'app-v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version
        id: bump
        run: |
          # Read current version from package.json
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "Current version: $CURRENT_VERSION"

          # Auto-increment patch version
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="$MAJOR.$MINOR.$NEW_PATCH"
          echo "New version: $NEW_VERSION"

          # Update package.json
          node -e "
            const pkg = require('./package.json');
            pkg.version = '$NEW_VERSION';
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

          # Update tauri.conf.json
          node -e "
            const conf = require('./src-tauri/tauri.conf.json');
            conf.version = '$NEW_VERSION';
            require('fs').writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(conf, null, 2) + '\n');
          "

          # Update Cargo.toml version
          sed -i "s/^version = \".*\"/version = \"$NEW_VERSION\"/" src-tauri/Cargo.toml

          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "tag=app-v$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json src-tauri/tauri.conf.json src-tauri/Cargo.toml
          git commit -m "chore: bump version to ${{ steps.bump.outputs.version }}" || true
          git tag ${{ steps.bump.outputs.tag }}
          git push origin HEAD --tags || true

  build-windows:
    needs: version
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri (Windows)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ needs.version.outputs.tag }}
          releaseName: 'ClipSave v${{ needs.version.outputs.version }}'
          releaseBody: |
            ## ClipSave v${{ needs.version.outputs.version }}

            ### Changes
            See commit history for details.

            ### Downloads
            - **Windows**: NSIS installer (.exe) and MSI installer
            - **Android**: APK (see Android job)

            ### Compliance Notice
            ClipSave only supports saving publicly accessible content that users have rights to save.
            It does not bypass login, DRM, paywalls, or access controls.
          releaseDraft: false
          prerelease: false

  build-android:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;26.1.10909125"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Android
        run: npm run tauri:android:build
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/26.1.10909125

      - name: Sign APK
        if: env.ANDROID_KEYSTORE != ''
        env:
          ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "Signing APK with provided keystore..."
          # Signing logic would go here

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk

  build-ios:
    needs: version
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,x86_64-apple-ios

      - name: Install frontend dependencies
        run: npm ci

      - name: Check iOS signing
        id: ios-check
        run: |
          if [ -z "${{ secrets.APPLE_CERTIFICATE }}" ]; then
            echo "has_signing=false" >> $GITHUB_OUTPUT
            echo "⚠️ iOS signing secrets not configured. Skipping iOS build."
            echo "To enable iOS builds, configure these secrets:"
            echo "  - APPLE_CERTIFICATE"
            echo "  - APPLE_CERTIFICATE_PASSWORD"
            echo "  - APPLE_PROVISIONING_PROFILE"
            echo "  - APPLE_TEAM_ID"
          else
            echo "has_signing=true" >> $GITHUB_OUTPUT
          fi

      - name: Build iOS
        if: steps.ios-check.outputs.has_signing == 'true'
        run: npm run tauri:ios:build
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_PROVISIONING_PROFILE: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: iOS build skipped notice
        if: steps.ios-check.outputs.has_signing == 'false'
        run: |
          echo "iOS build skipped - signing secrets not configured."
          echo "This is expected for open-source builds without Apple Developer credentials."
