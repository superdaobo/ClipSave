name: Release Build

on:
  push:
    tags:
      - "app-v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_INCREMENTAL: 0
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from tag
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/app-v* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/app-v}" >> "$GITHUB_OUTPUT"
          else
            echo "VERSION=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: ClipSave v${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: false
          body: |
            ## ClipSave v${{ steps.version.outputs.VERSION }}

            ### 下载 / Downloads
            - **Windows**: NSIS 安装包 (.exe) 和 MSI 安装包
            - **Android**: APK (arm64)
            - **iOS**: 未签名 IPA (可通过 SideStore/AltStore 安装)

            ### 合规声明
            ClipSave 仅支持保存用户有权保存的公开媒体内容。
            不绕过登录、DRM、付费墙或访问控制。
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    needs: create-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        shell: pwsh
        run: |
          $ver = "${env:GITHUB_REF}" -replace '^refs/tags/app-v', ''
          if (-not $ver -or $ver -eq $env:GITHUB_REF) {
            $ver = (Get-Content package.json | ConvertFrom-Json).version
          }
          "VERSION=$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Build Windows App
        run: npx tauri build --bundles nsis msi

      - name: Upload Windows artifacts
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-android:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/app-v}" >> "$GITHUB_OUTPUT"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup NDK
        run: |
          sdkmanager "ndk;27.0.11718014"
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.11718014" >> "$GITHUB_ENV"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Initialize Android project
        run: npx tauri android init

      - name: Build Android APK (arm64)
        run: npx tauri android build --target aarch64
        env:
          NDK_HOME: ${{ env.NDK_HOME }}

      - name: Sign APK
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF#refs/tags/app-v}"

          UNSIGNED_APK="$(find src-tauri/gen/android/app/build/outputs/apk -name '*.apk' | head -n 1)"
          if [ -z "$UNSIGNED_APK" ]; then
            echo "No unsigned APK found"
            find src-tauri/gen/android/app/build/outputs -maxdepth 6 -type f -print || true
            exit 1
          fi
          echo "Found APK: $UNSIGNED_APK"

          # Generate fallback keystore for signing
          keytool -genkeypair -v \
            -keystore release-key.jks \
            -alias clipsave \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=ClipSave, OU=Dev, O=ClipSave, L=Unknown, ST=Unknown, C=CN"

          "${ANDROID_SDK_ROOT}/build-tools/35.0.0/zipalign" -v -p 4 "$UNSIGNED_APK" app-aligned.apk
          APK_NAME="ClipSave_${VERSION}_arm64.apk"
          "${ANDROID_SDK_ROOT}/build-tools/35.0.0/apksigner" sign \
            --ks release-key.jks \
            --ks-key-alias clipsave \
            --ks-pass pass:android \
            --key-pass pass:android \
            --out "$APK_NAME" \
            app-aligned.apk
          ls -lh "$APK_NAME"

      - name: Upload Android APK
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          files: ClipSave_*_arm64.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-ios:
    needs: create-release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/app-v}" >> "$GITHUB_OUTPUT"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Patch tauri.conf.json for iOS CI
        run: |
          node --input-type=module - <<'NODE'
          import fs from 'node:fs';
          const p = 'src-tauri/tauri.conf.json';
          const conf = JSON.parse(fs.readFileSync(p, 'utf8'));
          conf.build = conf.build || {};
          delete conf.build.devUrl;
          delete conf.build.beforeDevCommand;
          conf.build.beforeBuildCommand = 'npm run build';
          conf.build.frontendDist = conf.build.frontendDist || '../dist';
          fs.writeFileSync(p, JSON.stringify(conf, null, 2) + '\n');
          console.log('Patched tauri.conf.json for iOS CI');
          NODE

      - name: Initialize iOS project
        run: npx tauri ios init

      - name: Build frontend
        run: npm run build

      - name: Build iOS with xcodebuild (unsigned)
        run: |
          set -euo pipefail
          XCODEPROJ="$(find src-tauri/gen/apple -name '*.xcodeproj' -type d | head -n 1)"
          if [ -z "$XCODEPROJ" ]; then
            echo "No Xcode project found"
            find src-tauri/gen/apple -maxdepth 3 -type d
            exit 1
          fi

          SCHEME="$(xcodebuild -project "$XCODEPROJ" -list -json | python3 -c "import sys,json; schemes=json.load(sys.stdin)['project']['schemes']; print([s for s in schemes if 'iOS' in s][0] if any('iOS' in s for s in schemes) else schemes[0])")"
          echo "Using scheme: $SCHEME"

          xcodebuild \
            -project "$XCODEPROJ" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -derivedDataPath build-ios \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_IDENTITY="" \
            DEVELOPMENT_TEAM="" || true

      - name: Package unsigned IPA
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          set -euo pipefail
          mkdir -p Payload

          APP_PATH="$(find build-ios/Build/Products -path "*iphoneos/*.app" -type d | head -n 1 || true)"
          if [ -z "$APP_PATH" ]; then
            echo "No iOS .app found, creating placeholder"
            echo "iOS build requires Xcode project setup. See README for local build instructions." > "ClipSave_${VERSION}_iOS_BUILD_NOTE.txt"
            exit 0
          fi

          cp -R "$APP_PATH" Payload/
          IPA_NAME="ClipSave_${VERSION}_iOS.ipa"
          zip -9 -r "$IPA_NAME" Payload
          ls -lh "$IPA_NAME"

      - name: Upload iOS IPA
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            ClipSave_*_iOS.ipa
            ClipSave_*_BUILD_NOTE.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
